baseURL: "https://CyberSecurityErial.github.io/echo_blog/"
languageCode: "zh-cn"
title: "Echo的技术博客"
theme: ["PaperMod"]

caches:
  images:
    dir: :cacheDir/images

markup:
  goldmark:
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
            - ["$$", "$$"]
            - ["\\[", "\\]"]
          inline:
            - ["\\(", "\\)"]
            - ["$", "$"]

params:
  env: production
  defaultTheme: auto
  disableSpecial1stPost: true
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  ShowToc: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  homeProfile:
    avatar: "images/avatar.jpg"
    bio: |
      22岁互联网社畜nerd
      老本行是应用密码学/区块链/隐私计算/联邦学习Theory
      现在AI System/AI Theory/AI Agent三修
      进无止境
      放弃幻想
      安心沉淀。
  socialIcons:
    - name: github
      title: GitHub
      url: "https://github.com/CyberSecurityErial"
    - name: email
      title: "csevanvan1024@gmail.com"
      url: "mailto:csevanvan1024@gmail.com"

taxonomies:
  category: categories
  tag: tags
  series: series

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: series
      name: 系列
      url: /series/
      weight: 25
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 30
