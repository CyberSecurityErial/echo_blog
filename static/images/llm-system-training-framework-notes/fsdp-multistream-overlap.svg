<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">FSDP multi-stream computation and communication overlap</title>
  <desc id="desc">Forward computation overlaps prefetch all-gather for the next FSDP unit. Backward computation overlaps alternating all-gather and reduce-scatter operations on a communication stream. Mixed precision conversion runs on a separate dtype-cast stream.</desc>
  <defs>
    <style>
      .title { font: 700 48px "PingFang SC", "Microsoft YaHei", Inter, Arial, sans-serif; fill: #172033; text-anchor: middle; }
      .section { font: 700 31px "PingFang SC", "Microsoft YaHei", Inter, Arial, sans-serif; fill: #0f766e; text-anchor: middle; }
      .lane { font: 700 22px "PingFang SC", "Microsoft YaHei", Inter, Arial, sans-serif; fill: #334155; }
      .bar { font: 700 17px "PingFang SC", "Microsoft YaHei", Inter, Arial, sans-serif; fill: #fff; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 600 17px "PingFang SC", "Microsoft YaHei", Inter, Arial, sans-serif; fill: #475569; }
      .note-title { font: 700 20px "PingFang SC", "Microsoft YaHei", Inter, Arial, sans-serif; }
      .note { font: 500 18px "PingFang SC", "Microsoft YaHei", Inter, Arial, sans-serif; fill: #334155; }
      .legend { font: 600 18px "PingFang SC", "Microsoft YaHei", Inter, Arial, sans-serif; fill: #334155; }
      .axis { fill: none; stroke: #475569; stroke-width: 3; marker-end: url(#axis-arrow); }
      .dependency { fill: none; stroke: #64748b; stroke-width: 2.5; marker-end: url(#dep-arrow); }
      .prefetch { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 6; marker-end: url(#dep-arrow); }
    </style>
    <marker id="axis-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#475569"/></marker>
    <marker id="dep-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/></marker>
    <linearGradient id="compute" x1="0" x2="1"><stop stop-color="#0f766e"/><stop offset="1" stop-color="#0d9488"/></linearGradient>
    <linearGradient id="allgather" x1="0" x2="1"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="reduce" x1="0" x2="1"><stop stop-color="#d97706"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
    <linearGradient id="cast" x1="0" x2="1"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#9333ea"/></linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="#fff"/>
  <text x="960" y="78" class="title">FSDP 多 Stream 通信计算重叠</text>

  <text x="610" y="140" class="section">前向 Forward</text>
  <text x="1405" y="140" class="section">反向 Backward</text>
  <line x1="970" y1="110" x2="970" y2="700" stroke="#94a3b8" stroke-width="2" stroke-dasharray="10 8"/>

  <!-- Lane backgrounds -->
  <rect x="70" y="170" width="1780" height="150" fill="#f8fafc"/>
  <rect x="70" y="320" width="1780" height="150" fill="#fff"/>
  <rect x="70" y="470" width="1780" height="150" fill="#f8fafc"/>
  <line x1="70" y1="320" x2="1850" y2="320" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="70" y1="470" x2="1850" y2="470" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="285" y1="170" x2="285" y2="620" stroke="#94a3b8" stroke-width="2"/>

  <!-- Lane labels -->
  <rect x="105" y="210" width="54" height="54" rx="12" fill="#0f766e"/>
  <text x="180" y="230" class="lane">计算</text><text x="180" y="258" class="lane">stream</text>
  <rect x="105" y="360" width="54" height="54" rx="12" fill="#2563eb"/>
  <text x="180" y="380" class="lane">NCCL collective</text><text x="180" y="408" class="lane">有效发出顺序</text>
  <rect x="105" y="510" width="54" height="54" rx="12" fill="#7c3aed"/>
  <text x="180" y="530" class="lane">dtype cast</text><text x="180" y="558" class="lane">stream</text>

  <!-- Forward overlap windows -->
  <rect x="455" y="170" width="155" height="450" fill="#dcfce7" opacity=".58"/>
  <rect x="675" y="170" width="155" height="450" fill="#dcfce7" opacity=".58"/>

  <!-- Forward compute -->
  <rect x="445" y="215" width="165" height="62" rx="10" fill="url(#compute)"/>
  <rect x="665" y="215" width="165" height="62" rx="10" fill="url(#compute)"/>
  <rect x="885" y="215" width="60" height="62" rx="10" fill="url(#compute)"/>
  <text x="527" y="247" class="bar">F Unit 0 计算</text>
  <text x="747" y="247" class="bar">F Unit 1 计算</text>
  <text x="915" y="247" class="bar">F2</text>

  <!-- Forward communication -->
  <rect x="365" y="365" width="70" height="62" rx="10" fill="url(#allgather)"/>
  <rect x="455" y="365" width="165" height="62" rx="10" fill="url(#allgather)"/>
  <rect x="675" y="365" width="165" height="62" rx="10" fill="url(#allgather)"/>
  <text x="400" y="388" class="bar">AG</text><text x="400" y="410" class="bar">Unit 0</text>
  <text x="537" y="388" class="bar">预取 AG</text><text x="537" y="410" class="bar">Unit 1</text>
  <text x="757" y="388" class="bar">预取 AG</text><text x="757" y="410" class="bar">Unit 2</text>

  <!-- Forward dtype cast -->
  <rect x="290" y="520" width="72" height="52" rx="9" fill="url(#cast)"/>
  <rect x="370" y="520" width="72" height="52" rx="9" fill="url(#cast)"/>
  <rect x="590" y="520" width="72" height="52" rx="9" fill="url(#cast)"/>
  <text x="326" y="547" class="bar">转换 U0</text>
  <text x="406" y="547" class="bar">转换 U1</text>
  <text x="626" y="547" class="bar">转换 U2</text>

  <!-- Forward dependencies -->
  <path class="dependency" d="M435 396 V300 Q435 285 445 277"/>
  <path class="prefetch" d="M620 396 V300 Q620 285 665 277"/>
  <path class="prefetch" d="M840 396 V300 Q840 285 885 277"/>
  <path class="dependency" d="M362 546 H365 V437"/>
  <path class="dependency" d="M442 546 H450 Q455 546 455 525 V437"/>
  <path class="dependency" d="M662 546 H670 Q675 546 675 525 V437"/>

  <!-- Backward timeline: BackwardPrefetch.BACKWARD_PRE -->
  <text x="1405" y="175" class="small" text-anchor="middle">以下主时间线对应 BackwardPrefetch.BACKWARD_PRE</text>
  <rect x="1060" y="185" width="105" height="435" fill="#dcfce7" opacity=".58"/>
  <rect x="1250" y="185" width="225" height="435" fill="#dcfce7" opacity=".58"/>
  <rect x="1495" y="185" width="90" height="435" fill="#dcfce7" opacity=".58"/>

  <!-- Backward compute: reverse unit order -->
  <rect x="1045" y="215" width="200" height="62" rx="10" fill="url(#compute)"/>
  <rect x="1260" y="215" width="220" height="62" rx="10" fill="url(#compute)"/>
  <rect x="1495" y="215" width="215" height="62" rx="10" fill="url(#compute)"/>
  <text x="1145" y="247" class="bar">B Unit 2 计算</text>
  <text x="1370" y="247" class="bar">B Unit 1 计算</text>
  <text x="1602" y="247" class="bar">B Unit 0 计算</text>

  <!-- NCCL collective issue order for BACKWARD_PRE -->
  <rect x="985" y="350" width="50" height="62" rx="10" fill="url(#allgather)"/>
  <rect x="1050" y="350" width="115" height="62" rx="10" fill="url(#allgather)"/>
  <rect x="1245" y="350" width="75" height="62" rx="10" fill="url(#reduce)"/>
  <rect x="1320" y="350" width="105" height="62" rx="10" fill="url(#allgather)"/>
  <rect x="1480" y="350" width="90" height="62" rx="10" fill="url(#reduce)"/>
  <rect x="1710" y="350" width="65" height="62" rx="10" fill="url(#reduce)"/>
  <text x="1010" y="373" class="bar">AG</text><text x="1010" y="395" class="bar">U2</text>
  <text x="1107" y="373" class="bar">预取 AG</text><text x="1107" y="395" class="bar">U1</text>
  <text x="1282" y="373" class="bar">RS</text><text x="1282" y="395" class="bar">Grad U2</text>
  <text x="1372" y="373" class="bar">预取 AG</text><text x="1372" y="395" class="bar">U0</text>
  <text x="1525" y="373" class="bar">RS</text><text x="1525" y="395" class="bar">Grad U1</text>
  <text x="1742" y="373" class="bar">RS</text><text x="1742" y="395" class="bar">U0</text>

  <!-- Backward pre-unshard mixed precision casts -->
  <rect x="950" y="520" width="34" height="52" rx="8" fill="url(#cast)"/>
  <rect x="1035" y="520" width="34" height="52" rx="8" fill="url(#cast)"/>
  <rect x="1300" y="520" width="34" height="52" rx="8" fill="url(#cast)"/>
  <text x="967" y="592" class="small" text-anchor="middle">cast U2</text>
  <text x="1052" y="592" class="small" text-anchor="middle">cast U1</text>
  <text x="1317" y="592" class="small" text-anchor="middle">cast U0</text>

  <!-- Backward dependencies from the FSDP runtime -->
  <path class="dependency" d="M984 546 H990 V420"/>
  <path class="dependency" d="M1069 546 H1075 V420"/>
  <path class="dependency" d="M1334 546 H1340 V420"/>
  <path class="dependency" d="M1035 381 V300 Q1035 285 1045 277"/>
  <path class="prefetch" d="M1165 381 V300 Q1165 285 1260 277"/>
  <path class="dependency" d="M1245 277 V335 Q1245 345 1245 350"/>
  <path class="prefetch" d="M1425 381 V300 Q1425 285 1495 277"/>
  <path class="dependency" d="M1480 277 V335 Q1480 345 1480 350"/>
  <path class="dependency" d="M1710 277 V335 Q1710 345 1710 350"/>

  <!-- Overlap labels -->
  <path d="M455 645 H830" stroke="#16a34a" stroke-width="3" stroke-dasharray="7 5"/>
  <path d="M455 645 l12 -7 v14 z" fill="#16a34a"/><path d="M830 645 l-12 -7 v14 z" fill="#16a34a"/>
  <text x="642" y="675" class="small" text-anchor="middle" fill="#166534">AG1 ∥ F0，AG2 ∥ F1；AG0 完成后 F0 才能开始</text>
  <path d="M1050 645 H1570" stroke="#16a34a" stroke-width="3" stroke-dasharray="7 5"/>
  <path d="M1050 645 l12 -7 v14 z" fill="#16a34a"/><path d="M1570 645 l-12 -7 v14 z" fill="#16a34a"/>
  <text x="1310" y="675" class="small" text-anchor="middle" fill="#166534">BACKWARD_PRE：下一 Unit 的 AG 与当前 B 重叠；当前 B 完成后才能发出本 Unit 的 RS</text>

  <!-- Time axis -->
  <path class="axis" d="M285 720 H1790"/>
  <text x="1000" y="755" class="lane" text-anchor="middle">时间 →</text>

  <!-- Legend -->
  <rect x="105" y="795" width="1710" height="70" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="150" y="815" width="42" height="30" rx="6" fill="#0f766e"/><text x="208" y="838" class="legend">计算</text>
  <rect x="390" y="815" width="42" height="30" rx="6" fill="#2563eb"/><text x="448" y="838" class="legend">All-Gather</text>
  <rect x="680" y="815" width="42" height="30" rx="6" fill="#d97706"/><text x="738" y="838" class="legend">Reduce-Scatter</text>
  <rect x="1035" y="815" width="42" height="30" rx="6" fill="#7c3aed"/><text x="1093" y="838" class="legend">dtype cast</text>
  <rect x="1325" y="815" width="42" height="30" rx="6" fill="#dcfce7"/><text x="1383" y="838" class="legend">并发重叠区间</text>

  <!-- Callouts -->
  <rect x="105" y="900" width="800" height="120" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="145" y="938" class="note-title" fill="#1d4ed8">Forward prefetch</text>
  <text x="145" y="972" class="note">当 CPU 无法及时下发下一次 All-Gather 时，提前预取可填满通信 stream。</text>
  <text x="145" y="1003" class="note">预取复用首次迭代的执行顺序，因此要求 static graph。</text>

  <rect x="1015" y="900" width="800" height="120" rx="18" fill="#fff7ed" stroke="#d97706" stroke-width="2"/>
  <text x="1055" y="938" class="note-title" fill="#b45309">Backward prefetch 两种源码语义</text>
  <text x="1055" y="972" class="note">BACKWARD_PRE：下一组 AG ∥ 当前梯度计算，重叠最多但峰值显存更高。</text>
  <text x="1055" y="1003" class="note">BACKWARD_POST：当前 RS ∥ 下一组梯度计算，重叠较少但峰值显存更低。</text>
</svg>
