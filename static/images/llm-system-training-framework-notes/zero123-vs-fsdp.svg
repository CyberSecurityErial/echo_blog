<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1200" viewBox="0 0 1920 1200" role="img" aria-labelledby="title desc">
  <title id="title">ZeRO-1、ZeRO-2、ZeRO-3 与 FSDP 对比</title>
  <desc id="desc">ZeRO stages progressively shard optimizer states, gradients, and parameters. FSDP full shard has sharding semantics closest to ZeRO-3 while organizing runtime all-gather and reshard around FSDP units using PyTorch hooks.</desc>
  <defs>
    <style>
      .title { font: 700 46px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #172033; text-anchor: middle; }
      .col { font: 700 31px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #fff; text-anchor: middle; }
      .row { font: 700 23px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #334155; text-anchor: middle; }
      .state { font: 700 18px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #334155; text-anchor: middle; }
      .rank { font: 600 14px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #64748b; text-anchor: middle; }
      .runtime { font: 600 17px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #334155; text-anchor: middle; }
      .core { font: 700 18px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #fff; text-anchor: middle; }
      .core-sub { font: 500 17px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #334155; text-anchor: middle; }
      .formula { font: 700 22px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #172033; text-anchor: middle; }
      .note { font: 500 17px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #475569; text-anchor: middle; }
      .badge { font: 700 17px "PingFang SC","Microsoft YaHei",Arial,sans-serif; fill: #fff; text-anchor: middle; }
      .arrow { fill: none; stroke: #475569; stroke-width: 3; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#475569"/></marker>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#cbd5e1" stroke-width="1"/></pattern>
  </defs>

  <rect width="1920" height="1200" fill="#fff"/>
  <text x="960" y="68" class="title">ZeRO-1 / ZeRO-2 / ZeRO-3 / FSDP 核心区别</text>

  <!-- Table -->
  <rect x="55" y="105" width="1810" height="900" rx="18" fill="#fff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="55" y="105" width="230" height="900" rx="18" fill="#f8fafc"/>
  <line x1="285" y1="105" x2="285" y2="1005" stroke="#94a3b8" stroke-width="2"/>
  <line x1="680" y1="105" x2="680" y2="1005" stroke="#94a3b8" stroke-width="2"/>
  <line x1="1075" y1="105" x2="1075" y2="1005" stroke="#94a3b8" stroke-width="2"/>
  <line x1="1470" y1="105" x2="1470" y2="1005" stroke="#94a3b8" stroke-width="2"/>
  <line x1="55" y1="185" x2="1865" y2="185" stroke="#94a3b8" stroke-width="2"/>
  <line x1="55" y1="355" x2="1865" y2="355" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="55" y1="525" x2="1865" y2="525" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="55" y1="695" x2="1865" y2="695" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="55" y1="875" x2="1865" y2="875" stroke="#cbd5e1" stroke-width="2"/>

  <rect x="285" y="105" width="395" height="80" fill="#2563eb"/>
  <rect x="680" y="105" width="395" height="80" fill="#d97706"/>
  <rect x="1075" y="105" width="395" height="80" fill="#15803d"/>
  <rect x="1470" y="105" width="395" height="80" rx="18" fill="#7c3aed"/>
  <text x="482" y="155" class="col">ZeRO-1</text>
  <text x="877" y="155" class="col">ZeRO-2</text>
  <text x="1272" y="155" class="col">ZeRO-3</text>
  <text x="1667" y="155" class="col">FSDP（FULL_SHARD）</text>

  <text x="170" y="275" class="row">参数 P</text>
  <text x="170" y="445" class="row">梯度 G</text>
  <text x="170" y="615" class="row">优化器状态 O</text>
  <text x="170" y="785" class="row">运行时通信</text>
  <text x="170" y="950" class="row">核心抽象</text>

  <!-- Helper: replicated bars -->
  <g fill="#2563eb">
    <rect x="330" y="235" width="65" height="65"/><rect x="410" y="235" width="65" height="65"/><rect x="490" y="235" width="65" height="65"/><rect x="570" y="235" width="65" height="65"/>
    <rect x="725" y="235" width="65" height="65"/><rect x="805" y="235" width="65" height="65"/><rect x="885" y="235" width="65" height="65"/><rect x="965" y="235" width="65" height="65"/>
  </g>
  <g class="rank">
    <text x="362" y="220">R0</text><text x="442" y="220">R1</text><text x="522" y="220">R2</text><text x="602" y="220">R3</text>
    <text x="757" y="220">R0</text><text x="837" y="220">R1</text><text x="917" y="220">R2</text><text x="997" y="220">R3</text>
  </g>
  <text x="482" y="330" class="state">完整复制 Replicated</text>
  <text x="877" y="330" class="state">完整复制 Replicated</text>

  <!-- Sharded parameter diagrams for ZeRO-3 and FSDP -->
  <g stroke="#94a3b8" stroke-width="1.5">
    <rect x="1120" y="235" width="65" height="65" fill="url(#grid)"/><rect x="1200" y="235" width="65" height="65" fill="url(#grid)"/><rect x="1280" y="235" width="65" height="65" fill="url(#grid)"/><rect x="1360" y="235" width="65" height="65" fill="url(#grid)"/>
    <rect x="1515" y="235" width="65" height="65" fill="url(#grid)"/><rect x="1595" y="235" width="65" height="65" fill="url(#grid)"/><rect x="1675" y="235" width="65" height="65" fill="url(#grid)"/><rect x="1755" y="235" width="65" height="65" fill="url(#grid)"/>
  </g>
  <g fill="#2563eb"><rect x="1120" y="235" width="32.5" height="32.5"/><rect x="1232.5" y="235" width="32.5" height="32.5"/><rect x="1280" y="267.5" width="32.5" height="32.5"/><rect x="1392.5" y="267.5" width="32.5" height="32.5"/>
    <rect x="1515" y="235" width="32.5" height="32.5"/><rect x="1627.5" y="235" width="32.5" height="32.5"/><rect x="1675" y="267.5" width="32.5" height="32.5"/><rect x="1787.5" y="267.5" width="32.5" height="32.5"/></g>
  <text x="1272" y="330" class="state">分片 Sharded</text><text x="1667" y="330" class="state">按 FSDP unit 分片</text>

  <!-- Gradient row -->
  <g fill="#f59e0b"><rect x="330" y="405" width="65" height="65"/><rect x="410" y="405" width="65" height="65"/><rect x="490" y="405" width="65" height="65"/><rect x="570" y="405" width="65" height="65"/></g>
  <text x="482" y="500" class="state">完整复制 Replicated</text>
  <g stroke="#94a3b8" stroke-width="1.5">
    <rect x="725" y="405" width="65" height="65" fill="url(#grid)"/><rect x="805" y="405" width="65" height="65" fill="url(#grid)"/><rect x="885" y="405" width="65" height="65" fill="url(#grid)"/><rect x="965" y="405" width="65" height="65" fill="url(#grid)"/>
    <rect x="1120" y="405" width="65" height="65" fill="url(#grid)"/><rect x="1200" y="405" width="65" height="65" fill="url(#grid)"/><rect x="1280" y="405" width="65" height="65" fill="url(#grid)"/><rect x="1360" y="405" width="65" height="65" fill="url(#grid)"/>
    <rect x="1515" y="405" width="65" height="65" fill="url(#grid)"/><rect x="1595" y="405" width="65" height="65" fill="url(#grid)"/><rect x="1675" y="405" width="65" height="65" fill="url(#grid)"/><rect x="1755" y="405" width="65" height="65" fill="url(#grid)"/>
  </g>
  <g fill="#f59e0b">
    <rect x="725" y="405" width="32.5" height="32.5"/><rect x="837.5" y="405" width="32.5" height="32.5"/><rect x="885" y="437.5" width="32.5" height="32.5"/><rect x="997.5" y="437.5" width="32.5" height="32.5"/>
    <rect x="1120" y="405" width="32.5" height="32.5"/><rect x="1232.5" y="405" width="32.5" height="32.5"/><rect x="1280" y="437.5" width="32.5" height="32.5"/><rect x="1392.5" y="437.5" width="32.5" height="32.5"/>
    <rect x="1515" y="405" width="32.5" height="32.5"/><rect x="1627.5" y="405" width="32.5" height="32.5"/><rect x="1675" y="437.5" width="32.5" height="32.5"/><rect x="1787.5" y="437.5" width="32.5" height="32.5"/>
  </g>
  <text x="877" y="500" class="state">分片 Sharded</text><text x="1272" y="500" class="state">分片 Sharded</text><text x="1667" y="500" class="state">分片 Sharded</text>

  <!-- Optimizer row: all sharded -->
  <g stroke="#94a3b8" stroke-width="1.5">
    <rect x="330" y="575" width="65" height="65" fill="url(#grid)"/><rect x="410" y="575" width="65" height="65" fill="url(#grid)"/><rect x="490" y="575" width="65" height="65" fill="url(#grid)"/><rect x="570" y="575" width="65" height="65" fill="url(#grid)"/>
    <rect x="725" y="575" width="65" height="65" fill="url(#grid)"/><rect x="805" y="575" width="65" height="65" fill="url(#grid)"/><rect x="885" y="575" width="65" height="65" fill="url(#grid)"/><rect x="965" y="575" width="65" height="65" fill="url(#grid)"/>
    <rect x="1120" y="575" width="65" height="65" fill="url(#grid)"/><rect x="1200" y="575" width="65" height="65" fill="url(#grid)"/><rect x="1280" y="575" width="65" height="65" fill="url(#grid)"/><rect x="1360" y="575" width="65" height="65" fill="url(#grid)"/>
    <rect x="1515" y="575" width="65" height="65" fill="url(#grid)"/><rect x="1595" y="575" width="65" height="65" fill="url(#grid)"/><rect x="1675" y="575" width="65" height="65" fill="url(#grid)"/><rect x="1755" y="575" width="65" height="65" fill="url(#grid)"/>
  </g>
  <g fill="#7c3aed">
    <rect x="330" y="575" width="32.5" height="32.5"/><rect x="442.5" y="575" width="32.5" height="32.5"/><rect x="490" y="607.5" width="32.5" height="32.5"/><rect x="602.5" y="607.5" width="32.5" height="32.5"/>
    <rect x="725" y="575" width="32.5" height="32.5"/><rect x="837.5" y="575" width="32.5" height="32.5"/><rect x="885" y="607.5" width="32.5" height="32.5"/><rect x="997.5" y="607.5" width="32.5" height="32.5"/>
    <rect x="1120" y="575" width="32.5" height="32.5"/><rect x="1232.5" y="575" width="32.5" height="32.5"/><rect x="1280" y="607.5" width="32.5" height="32.5"/><rect x="1392.5" y="607.5" width="32.5" height="32.5"/>
    <rect x="1515" y="575" width="32.5" height="32.5"/><rect x="1627.5" y="575" width="32.5" height="32.5"/><rect x="1675" y="607.5" width="32.5" height="32.5"/><rect x="1787.5" y="607.5" width="32.5" height="32.5"/>
  </g>
  <text x="482" y="670" class="state">分片</text><text x="877" y="670" class="state">分片</text><text x="1272" y="670" class="state">分片</text><text x="1667" y="670" class="state">分片</text>

  <!-- Runtime row -->
  <text x="482" y="755" class="runtime">梯度计算完成后</text><text x="482" y="785" class="runtime">All-Reduce gradients</text>
  <text x="877" y="755" class="runtime">梯度产生时分桶</text><text x="877" y="785" class="runtime">Reduce-Scatter gradients</text>
  <text x="1272" y="735" class="runtime">按需 All-Gather 参数</text>
  <rect x="1130" y="770" width="95" height="42" rx="9" fill="#2563eb"/><text x="1177" y="792" class="badge">AG</text>
  <path class="arrow" d="M1230 791 H1275"/><rect x="1280" y="765" width="105" height="52" rx="10" fill="#0f766e"/><text x="1332" y="792" class="badge">F/B</text>
  <path class="arrow" d="M1390 791 H1435"/><text x="1380" y="840" class="runtime">计算后 Reshard；梯度 RS</text>
  <text x="1667" y="725" class="runtime">每个 FSDP unit 生命周期</text>
  <rect x="1515" y="770" width="95" height="42" rx="9" fill="#2563eb"/><text x="1562" y="792" class="badge">AG</text>
  <path class="arrow" d="M1615 791 H1650"/><rect x="1655" y="765" width="105" height="52" rx="10" fill="#0f766e"/><text x="1707" y="792" class="badge">F/B</text>
  <path class="arrow" d="M1765 791 H1810"/><text x="1667" y="840" class="runtime">hook 驱动 Reshard / RS</text>

  <!-- Core abstraction row -->
  <rect x="330" y="910" width="305" height="46" rx="10" fill="#2563eb"/><text x="482" y="934" class="core">仅分片优化器状态</text>
  <rect x="725" y="910" width="305" height="46" rx="10" fill="#d97706"/><text x="877" y="934" class="core">逐步扩大状态分片</text>
  <rect x="1120" y="910" width="305" height="46" rx="10" fill="#15803d"/><text x="1272" y="934" class="core">完整 model-state 分片</text>
  <rect x="1515" y="900" width="305" height="58" rx="10" fill="#7c3aed"/><text x="1667" y="925" class="core">unit-based full sharding</text><text x="1667" y="947" class="core">wrap policy + hooks</text>
  <text x="482" y="985" class="core-sub">Optimizer-state partitioning</text>
  <text x="877" y="985" class="core-sub">参数仍复制，梯度与 O 分片</text>
  <text x="1272" y="985" class="core-sub">P / G / O 全部分片</text>
  <text x="1667" y="985" class="core-sub">分片语义接近 ZeRO-3，运行时组织不同</text>

  <!-- Relationship badge -->
  <rect x="1375" y="185" width="190" height="46" rx="23" fill="#334155"/>
  <text x="1470" y="209" class="badge">同属 full sharding</text>

  <!-- Formula strip -->
  <rect x="55" y="1030" width="1810" height="135" rx="18" fill="#fffbeb" stroke="#d97706" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="210" y="1070" class="row">每个 rank 的 model states</text>
  <text x="482" y="1095" class="formula">P + G + O / D</text>
  <text x="877" y="1095" class="formula">P + (G + O) / D</text>
  <text x="1272" y="1095" class="formula">(P + G + O) / D</text>
  <text x="1667" y="1095" class="formula">(P + G + O) / D</text>
  <text x="960" y="1140" class="note">P=参数，G=梯度，O=优化器状态，D=DP world size；不计运行时临时 All-Gather 出来的完整 unit 参数</text>
</svg>
