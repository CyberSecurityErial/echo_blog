<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Fully Sharded Data Parallel training process</title>
  <desc id="desc">Two data parallel ranks all-gather parameter shards before forward and backward computation, reduce-scatter gradients, and update local optimizer and parameter shards.</desc>
  <defs>
    <style>
      .title { font: 700 48px Inter, Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 22px Inter, Arial, sans-serif; fill: #64748b; }
      .rank { font: 700 24px Inter, Arial, sans-serif; fill: #334155; }
      .phase { font: 600 18px Inter, Arial, sans-serif; fill: #64748b; letter-spacing: .5px; }
      .box-title { font: 700 20px Inter, Arial, sans-serif; fill: #fff; text-anchor: middle; }
      .box-sub { font: 500 16px Inter, Arial, sans-serif; fill: #dbeafe; text-anchor: middle; }
      .legend { font: 600 19px Inter, Arial, sans-serif; fill: #334155; }
      .comm { font: 600 17px Inter, Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 4; marker-end: url(#arrow); }
      .comm-line { fill: none; stroke: #64748b; stroke-width: 3; stroke-dasharray: 9 8; marker-start: url(#arrow-small); marker-end: url(#arrow-small); }
      .loop { fill: none; stroke: #64748b; stroke-width: 4; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-small" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity=".10"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8fafc"/>
  <rect x="58" y="48" width="1804" height="984" rx="30" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="100" y="125" class="title">Fully Sharded Data Parallel (FSDP)</text>
  <text x="100" y="165" class="subtitle">Parameters, gradients, and optimizer states stay sharded; full parameters exist only during computation.</text>

  <text x="350" y="225" class="phase" text-anchor="middle">SHARDED STATE</text>
  <text x="660" y="225" class="phase" text-anchor="middle">MATERIALIZE PARAMETERS</text>
  <text x="930" y="225" class="phase" text-anchor="middle">COMPUTE</text>
  <text x="1215" y="225" class="phase" text-anchor="middle">SYNC GRADIENTS</text>
  <text x="1515" y="225" class="phase" text-anchor="middle">UPDATE LOCAL SHARD</text>

  <rect x="90" y="260" width="1740" height="285" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="90" y="575" width="1740" height="285" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="105" y="280" width="145" height="245" rx="18" fill="#e2e8f0"/>
  <rect x="105" y="595" width="145" height="245" rx="18" fill="#e2e8f0"/>
  <text x="177" y="390" class="rank" text-anchor="middle">DP Rank 0</text>
  <text x="177" y="420" class="subtitle" text-anchor="middle">GPU 0</text>
  <text x="177" y="705" class="rank" text-anchor="middle">DP Rank 1</text>
  <text x="177" y="735" class="subtitle" text-anchor="middle">GPU 1</text>

  <!-- Rank 0 -->
  <g filter="url(#shadow)">
    <rect x="285" y="347" width="180" height="110" rx="16" fill="#2563eb"/>
    <rect x="525" y="347" width="220" height="110" rx="16" fill="#0ea5e9"/>
    <rect x="805" y="347" width="190" height="110" rx="16" fill="#0f766e"/>
    <rect x="1055" y="347" width="230" height="110" rx="16" fill="#0ea5e9"/>
    <rect x="1345" y="347" width="220" height="110" rx="16" fill="#d97706"/>
    <rect x="1625" y="347" width="165" height="110" rx="16" fill="#7c3aed"/>
  </g>
  <text x="375" y="392" class="box-title">Parameter</text><text x="375" y="420" class="box-title">Shard 0</text>
  <text x="635" y="389" class="box-title">All-Gather</text><text x="635" y="417" class="box-title">Parameters</text>
  <text x="900" y="392" class="box-title">Forward</text><text x="900" y="420" class="box-sub">(local compute)</text>
  <text x="1170" y="389" class="box-title">All-Gather +</text><text x="1170" y="417" class="box-title">Backward</text>
  <text x="1455" y="389" class="box-title">Reduce-Scatter</text><text x="1455" y="417" class="box-title">Gradients</text>
  <text x="1707" y="382" class="box-title">Optimizer</text><text x="1707" y="410" class="box-title">Step</text><text x="1707" y="436" class="box-sub">(local shard)</text>

  <!-- Rank 1 -->
  <g filter="url(#shadow)">
    <rect x="285" y="662" width="180" height="110" rx="16" fill="#2563eb"/>
    <rect x="525" y="662" width="220" height="110" rx="16" fill="#0ea5e9"/>
    <rect x="805" y="662" width="190" height="110" rx="16" fill="#0f766e"/>
    <rect x="1055" y="662" width="230" height="110" rx="16" fill="#0ea5e9"/>
    <rect x="1345" y="662" width="220" height="110" rx="16" fill="#d97706"/>
    <rect x="1625" y="662" width="165" height="110" rx="16" fill="#7c3aed"/>
  </g>
  <text x="375" y="707" class="box-title">Parameter</text><text x="375" y="735" class="box-title">Shard 1</text>
  <text x="635" y="704" class="box-title">All-Gather</text><text x="635" y="732" class="box-title">Parameters</text>
  <text x="900" y="707" class="box-title">Forward</text><text x="900" y="735" class="box-sub">(local compute)</text>
  <text x="1170" y="704" class="box-title">All-Gather +</text><text x="1170" y="732" class="box-title">Backward</text>
  <text x="1455" y="704" class="box-title">Reduce-Scatter</text><text x="1455" y="732" class="box-title">Gradients</text>
  <text x="1707" y="697" class="box-title">Optimizer</text><text x="1707" y="725" class="box-title">Step</text><text x="1707" y="751" class="box-sub">(local shard)</text>

  <!-- Horizontal flow -->
  <path class="arrow" d="M465 402 H515"/>
  <path class="arrow" d="M745 402 H795"/>
  <path class="arrow" d="M995 402 H1045"/>
  <path class="arrow" d="M1285 402 H1335"/>
  <path class="arrow" d="M1565 402 H1615"/>
  <path class="arrow" d="M465 717 H515"/>
  <path class="arrow" d="M745 717 H795"/>
  <path class="arrow" d="M995 717 H1045"/>
  <path class="arrow" d="M1285 717 H1335"/>
  <path class="arrow" d="M1565 717 H1615"/>

  <!-- Collective communication -->
  <path class="comm-line" d="M635 468 V651"/>
  <path class="comm-line" d="M1170 468 V651"/>
  <path class="comm-line" d="M1455 468 V651"/>
  <rect x="562" y="528" width="146" height="34" rx="17" fill="#fff" stroke="#cbd5e1"/>
  <rect x="1097" y="528" width="146" height="34" rx="17" fill="#fff" stroke="#cbd5e1"/>
  <rect x="1372" y="528" width="166" height="34" rx="17" fill="#fff" stroke="#cbd5e1"/>
  <text x="635" y="551" class="comm">ALL-GATHER</text>
  <text x="1170" y="551" class="comm">ALL-GATHER</text>
  <text x="1455" y="551" class="comm">REDUCE-SCATTER</text>

  <!-- Next iteration loops -->
  <path class="loop" d="M1707 337 V300 H375 V337"/>
  <path class="loop" d="M1707 782 V820 H375 V782"/>
  <text x="1040" y="291" class="comm">NEXT ITERATION — KEEP ONLY UPDATED LOCAL SHARD</text>
  <text x="1040" y="847" class="comm">NEXT ITERATION — KEEP ONLY UPDATED LOCAL SHARD</text>

  <!-- Legend -->
  <rect x="285" y="915" width="28" height="28" rx="6" fill="#2563eb"/>
  <text x="330" y="937" class="legend">Parameter shards</text>
  <rect x="660" y="915" width="28" height="28" rx="6" fill="#d97706"/>
  <text x="705" y="937" class="legend">Gradient shards</text>
  <rect x="1020" y="915" width="28" height="28" rx="6" fill="#7c3aed"/>
  <text x="1065" y="937" class="legend">Optimizer state shards</text>
  <rect x="1435" y="908" width="350" height="44" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="1610" y="937" class="legend" text-anchor="middle">Full parameters are temporary</text>
</svg>
